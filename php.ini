;extension=imagick.so
date.timezone=Asia/Tokyo
display_startup_errors=On
error_log=/tmp/php_error_log
error_reporting=E_ALL
expose_php=Off
highlight.comment=#ff7f2a
highlight.default=#5f8dd3
highlight.html=#888A85
highlight.keyword=#44aa00
highlight.string=#fd3301
memory_limit=3G
output_handler=ob_gzhandler
pcre.backtrack_limit=9000000
pcre.recursion_limit=900000
realpath_cache_size=64M
realpath_cache_ttl=7200
register_argc_argv=Off
sendmail_path="/usr/bin/msmtp -t"
session.cookie_httponly=1
session.cookie_secure=1
session.save_path=/tmp/
session.use_strict_mode=1
upload_max_filesize=10M
upload_tmp_dir=/tmp/
zend_extension=opcache.so
opcache.enable=1
opcache.enable_cli=1
